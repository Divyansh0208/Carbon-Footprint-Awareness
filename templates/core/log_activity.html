{% extends "core/base.html" %}
{% block title %}Log Activity{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Log an activity</h1>
<form method="post" class="space-y-4 max-w-md bg-white rounded-lg shadow p-4">
    {% csrf_token %}

    <div>
        <label class="block text-sm font-medium mb-1">{{ form.category.label }}</label>
        <select name="category" id="id_category"
            class="w-full border rounded px-2 py-1"
            hx-get="{% url 'factor_options' %}"
            hx-target="#factor-wrapper"
            hx-trigger="change"
            hx-include="this">
            {% for value, label in form.category.field.choices %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select>
    </div>

    <div id="factor-wrapper">
        <label class="block text-sm font-medium mb-1">{{ form.factor.label }}</label>
        {{ form.factor }}
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">{{ form.quantity.label }}</label>
        {{ form.quantity }}
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">{{ form.date.label }}</label>
        {{ form.date }}
    </div>

    <button type="submit" class="bg-green-700 text-white px-4 py-2 rounded hover:bg-green-800">Save</button>
</form>
{% endblock %}
