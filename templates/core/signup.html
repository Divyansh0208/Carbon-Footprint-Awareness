{% extends "core/base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto pt-8">
    <h1 class="text-3xl font-display font-semibold tracking-tight mb-8 text-center">Start your ledger</h1>
    <form method="post" class="space-y-1 border border-stonelight p-6">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit"
            class="w-full bg-moss text-paper px-5 py-2.5 rounded-sm text-sm font-medium hover:bg-mossdark transition-colors focus-ring mt-2">Create
            account</button>
    </form>
    <p class="mt-5 text-sm text-center text-stone">Already have an account? <a href="{% url 'login' %}"
            class="text-moss font-medium hover:text-mossdark focus-ring">Log in</a></p>
</div>
{% endblock %}
