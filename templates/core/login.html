{% extends "core/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Login</h1>
<form method="post" class="space-y-4 max-w-sm">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-green-700 text-white px-4 py-2 rounded hover:bg-green-800">Login</button>
</form>
<p class="mt-4 text-sm">No account? <a href="{% url 'signup' %}" class="text-green-700 underline">Sign up</a></p>
{% endblock %}
