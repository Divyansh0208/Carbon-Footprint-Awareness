<label class="block text-xs uppercase tracking-wide text-stone font-medium mb-1.5">Activity type</label>
<select name="factor" id="id_factor"
    class="w-full border border-stonelight bg-paper rounded-sm px-3 py-2 text-sm focus-ring">
    <option value="">— select activity —</option>
    {% for f in factors %}
    <option value="{{ f.id }}">{{ f.label }} ({{ f.unit }})</option>
    {% endfor %}
</select>
