<form hx-post="{% url 'qa' %}" hx-target="#qa-widget" hx-swap="innerHTML" class="flex gap-2">
    {% csrf_token %}
    {{ form.question }}
    <button type="submit" class="bg-green-700 text-white px-3 py-1 rounded hover:bg-green-800 whitespace-nowrap">Ask</button>
</form>
{% if answer %}
<p class="text-sm bg-green-50 border border-green-200 rounded p-3 mt-3">{{ answer }}</p>
{% endif %}
{% if error %}
<p class="text-sm bg-red-50 border border-red-200 rounded p-3 mt-3 text-red-700">{{ error }}</p>
{% endif %}
