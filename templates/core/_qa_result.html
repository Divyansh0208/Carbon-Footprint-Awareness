<form hx-post="{% url 'qa' %}" hx-target="#qa-widget" hx-swap="innerHTML" class="flex gap-2">
    {% csrf_token %}
    {{ form.question }}
    <button type="submit"
        class="bg-moss text-paper px-4 py-2 rounded-sm text-sm font-medium hover:bg-mossdark transition-colors focus-ring whitespace-nowrap">Ask</button>
</form>
{% if answer %}
<p class="text-sm text-ink bg-paper border border-moss/20 rounded-sm p-3.5 mt-3 leading-relaxed">{{ answer }}</p>
{% endif %}
{% if error %}
<p class="text-sm bg-rust/5 border border-rust/20 rounded-sm p-3.5 mt-3 text-rust">{{ error }}</p>
{% endif %}
