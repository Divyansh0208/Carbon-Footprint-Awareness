{% extends "core/base.html" %}
{% block title %}Set Goal{% endblock %}
{% block content %}
<p class="text-xs uppercase tracking-widest text-stone font-medium mb-1">Reduce</p>
<h1 class="text-3xl font-display font-semibold tracking-tight mb-8">Set your monthly goal</h1>
<form method="post" class="space-y-1 max-w-sm border border-stonelight p-6">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit"
        class="bg-moss text-paper px-5 py-2 rounded-sm text-sm font-medium hover:bg-mossdark transition-colors focus-ring mt-2">Save
        goal</button>
</form>
{% endblock %}
