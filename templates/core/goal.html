{% extends "core/base.html" %}
{% block title %}Set Goal{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Set your monthly goal</h1>
<form method="post" class="space-y-4 max-w-sm bg-white rounded-lg shadow p-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-green-700 text-white px-4 py-2 rounded hover:bg-green-800">Save Goal</button>
</form>
{% endblock %}
